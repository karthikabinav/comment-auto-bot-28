name: Auto Comment

on:
  issues:
    types:
      - opened

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment on issue
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            let message = null;
            
            if (labels.includes('bug')) {
              message = "Thank you. We will fix it. Best regards, karthikabinav.";
            } else if (labels.includes('feature')) {
              message = "Thank you, we will consider to include this feature. Best regards, karthikabinav.";
            } else if (labels.includes('discussion')) {
              message = "Happy to discuss this topic with you. Best regards, karthikabinav.";
            }
            
            if (message) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });
            }