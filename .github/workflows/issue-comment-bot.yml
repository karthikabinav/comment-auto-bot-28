name: Issue Comment Bot

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue labels and comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const labels = issue.labels.map(label => label.name);
            
            let comment = null;
            const ownerName = "Karthik Abinav Sankararaman";
            
            if (labels.includes("bug")) {
              comment = `Thank you. We will fix it. Best regards, ${ownerName}.`;
            } else if (labels.includes("feature")) {
              comment = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
            } else if (labels.includes("discussion")) {
              comment = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
            }
            
            if (comment) {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issue_number,
                body: comment
              });
            }