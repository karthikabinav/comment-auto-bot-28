name: Issue Comment Bot

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add label-based comment
        uses: actions/github-script@v7
        with:
          script: |
            const ownerName = 'Karthik Abinav Sankararaman';
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => typeof label === 'string' ? label : label.name);

            const messages = {
              bug: `Thank you. We will fix it. Best regards, ${ownerName}.`,
              feature: `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`,
              discussion: `Happy to discuss this topic with you. Best regards, ${ownerName}.`
            };

            let message = null;
            if (context.payload.action === 'labeled') {
              const labelName = context.payload.label && context.payload.label.name;
              message = messages[labelName] || null;
            } else {
              for (const labelName of ['bug', 'feature', 'discussion']) {
                if (labels.includes(labelName)) {
                  message = messages[labelName];
                  break;
                }
              }
            }

            if (!message) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message
            });
