name: Issue Comment Bot

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add automatic label-based comment
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(label => label.name);
            let body = null;

            if (labels.includes('bug')) {
              body = 'Thank you. We will fix it. Best regards, Karthik Abinav Sankararaman.';
            } else if (labels.includes('feature')) {
              body = 'Thank you, we will consider to include this feature. Best regards, Karthik Abinav Sankararaman.';
            } else if (labels.includes('discussion')) {
              body = 'Happy to discuss this topic with you. Best regards, Karthik Abinav Sankararaman.';
            }

            if (body) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
