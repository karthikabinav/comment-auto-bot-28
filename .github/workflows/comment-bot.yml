name: Comment Auto Bot
on:
  issues:
    types: [opened]
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(label => label.name);
            let commentBody = "";
            if (labels.includes("bug")) {
              commentBody = "Thank you. We will fix it. Best regards, Karthik Abinav Sankararaman.";
            } else if (labels.includes("feature")) {
              commentBody = "Thank you, we will consider to include this feature. Best regards, Karthik Abinav Sankararaman.";
            } else if (labels.includes("discussion")) {
              commentBody = "Happy to discuss this topic with you. Best regards, Karthik Abinav Sankararaman.";
            }
            if (commentBody) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: commentBody
              });
            }
