name: Automated Comment Bot

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

concurrency:
  group: issue-comment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add automated comment based on issue label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map(label => label.name);
            let messageTemplate = '';

            if (labels.includes('bug')) {
              messageTemplate = 'Thank you. We will fix it. Best regards, {ownerName}.';
            } else if (labels.includes('feature')) {
              messageTemplate = 'Thank you, we will consider to include this feature. Best regards, {ownerName}.';
            } else if (labels.includes('discussion')) {
              messageTemplate = 'Happy to discuss this topic with you. Best regards, {ownerName}.';
            }

            if (!messageTemplate) {
              return;
            }

            const { data: ownerData } = await github.rest.users.getByUsername({
              username: context.repo.owner
            });

            const ownerName = ownerData.name || context.repo.owner;
            const body = messageTemplate.replace('{ownerName}', ownerName);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const alreadyCommented = comments.some(comment =>
              comment.user?.login === 'github-actions[bot]' && comment.body === body
            );

            if (alreadyCommented) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
