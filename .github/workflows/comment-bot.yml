name: Automated Comment Bot

on:
  issues:
    types: [opened, labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment based on label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const labels = issue.labels.map(l => l.name.toLowerCase());
            let message = ;
            if (labels.includes(bug)) {
              message = `Thank you. We will fix it. Best regards, ${owner}.`;
            } else if (labels.includes(feature)) {
              message = `Thank you, we will consider to include this feature. Best regards, ${owner}.`;
            } else if (labels.includes(discussion)) {
              message = `Happy to discuss this topic with you. Best regards, ${owner}.`;
            }
            if (message) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });
            }