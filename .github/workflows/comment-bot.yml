name: Auto Comment Bot

on:
  issues:
    types: [opened, labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add comment based on label
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const labels = context.payload.issue.labels.map(l => l.name);
            let body = "";
            if (labels.includes("bug")) {
              body = `Thank you. We will fix it. Best regards, ${owner}.`;
            } else if (labels.includes("feature")) {
              body = `Thank you, we will consider to include this feature. Best regards, ${owner}.`;
            } else if (labels.includes("discussion")) {
              body = `Happy to discuss this topic with you. Best regards, ${owner}.`;
            }
            if (body) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
