name: Comment Bot
on:
  issues:
    types: [opened]
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            let body;
            if (labels.includes(bug)) {
              body = `Thank you. We will fix it. Best regards, ${context.repo.owner}.`;
            } else if (labels.includes(feature)) {
              body = `Thank you, we will consider to include this feature. Best regards, ${context.repo.owner}.`;
            } else if (labels.includes(discussion)) {
              body = `Happy to discuss this topic with you. Best regards, ${context.repo.owner}.`;
            }
            if (body) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }