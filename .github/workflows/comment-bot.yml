name: Issue Comment Bot
on:
  issues:
    types: [opened]
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const labels = context.payload.issue.labels.map(label => label.name);
            let body = "";
            const ownerName = "Karthik Abinav Sankararaman";
            if (labels.includes("bug")) {
              body = `Thank you. We will fix it. Best regards, ${ownerName}.`;
            } else if (labels.includes("feature")) {
              body = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
            } else if (labels.includes("discussion")) {
              body = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
            }
            if (body) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
