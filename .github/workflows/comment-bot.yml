name: Automated Comment Bot

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: issue-comment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add automated comment based on issue label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map(label => label.name);
            const ownerName = 'Karthik Abinav Sankararaman';
            let body = '';

            if (labels.includes('bug')) {
              body = `Thank you. We will fix it. Best regards, ${ownerName}.`;
            } else if (labels.includes('feature')) {
              body = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
            } else if (labels.includes('discussion')) {
              body = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
            }

            if (!body) {
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const alreadyCommented = comments.some(comment =>
              comment.user?.login === 'github-actions[bot]' && comment.body === body
            );

            if (alreadyCommented) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
