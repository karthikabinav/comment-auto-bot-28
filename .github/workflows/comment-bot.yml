name: Issue Comment Bot
on:
  issues:
    types: [opened, labeled]
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = issue.labels.map(l => l.name);
            let body = null;
            if (labels.includes('bug')) {
              body = `Thank you. We will fix it. Best regards, ${owner}.`;
            } else if (labels.includes('feature')) {
              body = `Thank you, we will consider to include this feature. Best regards, ${owner}.`;
            } else if (labels.includes('discussion')) {
              body = `Happy to discuss this topic with you. Best regards, ${owner}.`;
            }
            if (body) {
              await github.rest.issues.createComment({owner, repo, issue_number: issue.number, body});
            }
