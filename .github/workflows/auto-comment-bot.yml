name: Issue Auto Comment Bot
on:
  issues:
    types: [opened]
jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const ownerName = 'Karthik Abinav Sankararaman';
            let body = null;
            if (labels.includes('bug')) {
              body = `Thank you. We will fix it. Best regards, ${ownerName}.`;
            } else if (labels.includes('feature')) {
              body = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
            } else if (labels.includes('discussion')) {
              body = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
            }
            if (body) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
