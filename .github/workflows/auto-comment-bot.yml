name: Automated Comment Bot

on:
  issues:
    types: [opened]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on bug issues
        if: contains(github.event.issue.labels.*.name, 'bug')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Thank you. We will fix it. Best regards, Karthik Abinav Sankararaman."
            })
      - name: Comment on feature issues
        if: contains(github.event.issue.labels.*.name, 'feature')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Thank you, we will consider to include this feature. Best regards, Karthik Abinav Sankararaman."
            })
      - name: Comment on discussion issues
        if: contains(github.event.issue.labels.*.name, 'discussion')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Happy to discuss this topic with you. Best regards, Karthik Abinav Sankararaman."
            })