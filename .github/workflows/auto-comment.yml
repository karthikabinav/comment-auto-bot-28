name: Auto Comment Bot
on:
  issues:
    types: [opened, labeled]

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check and comment
        uses: actions/github-script@v6
        with:
          script: |
            const { data: user } = await github.rest.users.getByUsername({ username: context.repo.owner });
            const ownerName = user.name || context.repo.owner;
            const issueLabels = context.payload.issue.labels.map(l => l.name);
            let commentBody = "";

            if (context.payload.action === 'labeled') {
              const labelAdded = context.payload.label.name;
              if (labelAdded === 'bug') {
                commentBody = `Thank you. We will fix it. Best regards, ${ownerName}.`;
              } else if (labelAdded === 'feature') {
                commentBody = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
              } else if (labelAdded === 'discussion') {
                commentBody = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
              }
            } else if (context.payload.action === 'opened') {
              if (issueLabels.includes('bug')) {
                commentBody = `Thank you. We will fix it. Best regards, ${ownerName}.`;
              } else if (issueLabels.includes('feature')) {
                commentBody = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
              } else if (issueLabels.includes('discussion')) {
                commentBody = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
              }
            }

            if (commentBody) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }
