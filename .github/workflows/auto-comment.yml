name: Automated Comment Bot

on:
  issues:
    types: [opened, labeled]

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment based on label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const ownerName = "Karthik Abinav Sankararaman";
            let commentBody = null;
            
            if (labels.includes("bug")) {
              commentBody = `Thank you. We will fix it. Best regards, ${ownerName}.`;
            } else if (labels.includes("feature")) {
              commentBody = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
            } else if (labels.includes("discussion")) {
              commentBody = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
            }
            
            if (commentBody) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody
              });
            }
