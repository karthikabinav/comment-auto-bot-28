name: Auto Comment Bot

on:
  issues:
    types: [opened]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add comment based on label
        uses: actions/github-script@v6
        with:
          script: |
            const labels = context.payload.issue.labels.map(label => label.name);
            let message = "";
            const owner = context.repo.owner;
            if (labels.includes("bug")) {
              message = `Thank you. We will fix it. Best regards, ${owner}.`;
            } else if (labels.includes("feature")) {
              message = `Thank you, we will consider to include this feature. Best regards, ${owner}.`;
            } else if (labels.includes("discussion")) {
              message = `Happy to discuss this topic with you. Best regards, ${owner}.`;
            } else {
              message = "Hello, world!";
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
