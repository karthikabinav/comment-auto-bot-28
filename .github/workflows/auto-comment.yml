name: Automated Issue Comment Bot
on:
  issues:
    types: [opened, labeled]
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labelNames = context.payload.issue.labels.map(l => l.name);
            const ownerName = "Karthik Abinav Sankararaman";
            let comment = "";
            if (labelNames.includes("bug")) {
              comment = `Thank you. We will fix it. Best regards, ${ownerName}.`;
            } else if (labelNames.includes("feature")) {
              comment = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
            } else if (labelNames.includes("discussion")) {
              comment = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
            }
            if (comment) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
