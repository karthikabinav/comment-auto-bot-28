name: Auto Comment Bot
on:
  issues:
    types: [opened]
jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment on issue
        uses: actions/github-script@v6
        with:
          script: |
            const labels = context.payload.issue.labels.map(label => label.name);
            const owner = context.repo.owner;
            let commentBody = "";
            if (labels.includes("bug")) {
              commentBody = `Thank you. We will fix it. Best regards, ${owner}.`;
            } else if (labels.includes("feature")) {
              commentBody = `Thank you, we will consider to include this feature. Best regards, ${owner}.`;
            } else if (labels.includes("discussion")) {
              commentBody = `Happy to discuss this topic with you. Best regards, ${owner}.`;
            }
            if (commentBody) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
