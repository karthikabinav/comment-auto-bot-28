name: Automated Comment Bot

on:
  issues:
    types: [opened]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment based on label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const ownerName = "karthikabinav";
            let body = "";
            if (labels.includes("bug")) {
              body = `Thank you. We will fix it. Best regards, ${ownerName}.`;
            } else if (labels.includes("feature")) {
              body = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
            } else if (labels.includes("discussion")) {
              body = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
            } else {
              body = "Hello, world!";
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: body
            });
