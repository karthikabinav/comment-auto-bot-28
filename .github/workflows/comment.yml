name: Issue Comment Bot
on:
  issues:
    types: [opened, labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add comment based on label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            // Only act if triggered by 'opened' or if a relevant label was just added
            if (context.payload.action === 'labeled') {
              const labelName = context.payload.label.name;
              if (!['bug', 'feature', 'discussion'].includes(labelName)) {
                return;
              }
            }
            
            const labels = issue.labels.map(l => l.name);
            const ownerName = "Karthik Abinav Sankararaman";
            
            let message = '';
            
            // Determine message based on labels
            // If action is labeled, we check the newly added label first to avoid duplicate comments
            // For simplicity, let's just check the current labels
            
            if (context.payload.action === 'opened') {
              if (labels.includes('bug')) {
                message = `Thank you. We will fix it. Best regards, ${ownerName}.`;
              } else if (labels.includes('feature')) {
                message = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
              } else if (labels.includes('discussion')) {
                message = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
              }
            } else if (context.payload.action === 'labeled') {
              const labelName = context.payload.label.name;
              if (labelName === 'bug') {
                message = `Thank you. We will fix it. Best regards, ${ownerName}.`;
              } else if (labelName === 'feature') {
                message = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
              } else if (labelName === 'discussion') {
                message = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
              }
            }
            
            if (message) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }
